<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantix</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    h1 {
      font-size: 20px;
      color: #5cb85c;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
    .instructions {
      background-color: #f9f9f9;
      padding: 15px;
      border-radius: 5px;
      margin-top: 10px;
    }
    .toggle-container {
      margin-top: 15px;
      padding: 15px;
      background-color: #e8f5e9;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-container span {
      font-size: 13px;
      color: #333;
    }
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #5cb85c;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>
</head>
<body>
  <h1>📚 Semantix</h1>
  <div class="instructions">
    <p><strong>How to use:</strong></p>
    <p>Double-click any word on a webpage to get its contextual definition, synonyms, antonyms, and usage examples.</p>
  </div>
  <div class="toggle-container">
    <span>Ask before explaining</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleMode">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
